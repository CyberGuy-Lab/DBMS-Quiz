<style>

  /* typography */

  /* progress bar */

  .btn{cursor:pointer;border:none;border-radius:10px;font-family:'Lato',sans-serif;font-weight:700;font-size:1rem;padding:14px;width:100%;transition:transform .18s,filter .18s;display:block;margin-bottom:10px;}

  .stat-card{background:#0b1c27;border-radius:10px;padding:14px 18px;margin-bottom:10px;}
  .stat-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
  .improve-box{background:#0c1520;border:1.5px solid rgba(255,107,53,.19);border-radius:12px;padding:20px 22px;margin-bottom:28px;}
  .improve-item{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid #192c38;}

  .improve-tip{font-size:.87rem;line-height:1.78;color:#7a9aaa;border-left:3px solid rgba(255,107,53,.3);padding-left:12px;margin-top:7px;}
  .strong-box{background:#09180f;border:1.5px solid rgba(168,255,62,.17);border-radius:12px;padding:18px 22px;margin-bottom:28px;}
  .strong-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #111e0f;font-size:.88rem;}

  /* missed Q accordion */
  .missed-item{background:#0b1c27;border:1.5px solid #192c38;border-radius:10px;margin-bottom:9px;overflow:hidden;}
  .missed-summary{padding:13px 18px;display:flex;gap:12px;align-items:flex-start;justify-content:space-between;cursor:pointer;font-size:.88rem;color:#b0cad5;line-height:1.5;list-style:none;}
  .missed-summary::-webkit-details-marker{display:none;}

  /* top bar */
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}

  /* score hero */

<script>
// ═══════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════
const TOPIC_COLORS = {
  "Data Abstraction":             { accent:"#00e5ff", badge:"rgba(0,229,255,.1)" },
  "DB Languages & Relationships": { accent:"#ff6b35", badge:"rgba(255,107,53,.1)" },
  "ER Diagram":                   { accent:"#a8ff3e", badge:"rgba(168,255,62,.1)" },
  "Relational Model & Algebra":   { accent:"#e040fb", badge:"rgba(224,64,251,.1)" },
  "MySQL":                        { accent:"#ffca28", badge:"rgba(255,202,40,.1)" },
};

const IMPROVE_TIPS = {
  "Data Abstraction":"Review the three-schema ANSI/SPARC architecture. Understand the difference between physical, logical, and view levels — and what 'data independence' means at each level. Draw the three-schema diagram from memory.",
  "DB Languages & Relationships":"Practice DDL, DML, DCL, and TCL command categories. Write queries to reinforce the difference between DELETE, TRUNCATE, and DROP. Create sample tables and practice One-to-Many vs Many-to-Many resolution with junction tables.",
  "ER Diagram":"Draw ER diagrams by hand from real-world scenarios (Library, Hospital, School). Memorise shape notation: rectangle = entity, ellipse = attribute, diamond = relationship. Practice weak entities, derived attributes, and double-line total participation.",
  "Relational Model & Algebra":"Work through Relational Algebra expressions on paper — practice σ (Selection), π (Projection), ∪ (Union), × (Cartesian Product), and ⋈ (Natural Join). Revise normalisation: 1NF → 2NF → 3NF with worked examples.",
  "MySQL":"Practice writing MySQL queries live (use db-fiddle.com or MySQL Workbench). Focus on SELECT with WHERE, GROUP BY, HAVING, JOINs, aggregate functions, and ALTER TABLE syntax.",
};

const QUESTIONS = [
  // DATA ABSTRACTION
  {id:1,topic:"Data Abstraction",q:"Which level of data abstraction describes how data is actually stored in the database?",options:["View Level","Logical Level","Physical Level","Conceptual Level"],answer:2,explain:"The Physical Level is the lowest level of abstraction. It describes the complex low-level data structures used to store data — such as files, blocks, and indexes. Users never interact with this layer directly."},
  {id:2,topic:"Data Abstraction",q:"The logical level of abstraction describes ___.",options:["What data is stored and what relationships exist","How data appears to end users","How data is physically stored on disk","SQL syntax only"],answer:0,explain:"The Logical Level (also called the Conceptual Level) describes WHAT data is stored and the relationships between them, without concern for how that data is physically stored. Database administrators work primarily at this level."},
  {id:3,topic:"Data Abstraction",q:"Which abstraction level hides the complexity of data structures from users?",options:["Physical Level","Logical Level","View Level","Schema Level"],answer:2,explain:"The View Level (External Level) is the highest level of abstraction. It presents only a portion of the database relevant to a particular user or application, hiding all complexity underneath."},
  {id:4,topic:"Data Abstraction",q:"A 'schema' in DBMS refers to ___.",options:["A physical storage file","The overall design/structure of a database","A query result","An index on a table"],answer:1,explain:"A schema is the logical structure or blueprint of a database — it defines the tables, columns, data types, constraints, and relationships. It does NOT contain actual data, only the structure."},
  {id:5,topic:"Data Abstraction",q:"Data independence means ___.",options:["Data can be duplicated freely","Changes to one level do not affect other levels","All users see the same view","Data is stored without constraints"],answer:1,explain:"Data independence is the ability to modify the schema at one level without affecting the schema at the next higher level. This is a major goal of the three-schema architecture — insulating applications from low-level storage changes."},
  {id:6,topic:"Data Abstraction",q:"Logical data independence allows ___.",options:["Changing physical storage without affecting logical schema","Changing logical schema without affecting application programs","Adding indexes without altering tables","Encrypting data at rest"],answer:1,explain:"Logical data independence means you can change the conceptual/logical schema (e.g., add a new table or modify a column) without having to rewrite application programs that rely on external views."},
  {id:7,topic:"Data Abstraction",q:"Physical data independence allows ___.",options:["Changing physical storage without affecting the logical schema","Changing logical schema without affecting views","Removing tables without affecting applications","Creating new views freely"],answer:0,explain:"Physical data independence means you can change the internal/physical schema (e.g., switch storage formats, reorganize files, change index structures) without affecting the logical schema or application programs."},
  {id:8,topic:"Data Abstraction",q:"Which of these is NOT a level of the three-schema ANSI/SPARC architecture?",options:["External schema","Conceptual schema","Internal schema","Binary schema"],answer:3,explain:"The three-schema ANSI/SPARC architecture consists of the External (View), Conceptual (Logical), and Internal (Physical) schemas. 'Binary schema' does not exist in this model."},
  {id:9,topic:"Data Abstraction",q:"An 'instance' of a database is ___.",options:["The database schema at a point in time","The actual data stored at a particular moment","A stored procedure","A virtual table"],answer:1,explain:"An instance is the snapshot of the data stored in a database at a specific moment in time. The schema is the structure (which rarely changes), while the instance is the actual content (which changes with every INSERT, UPDATE, or DELETE)."},
  {id:10,topic:"Data Abstraction",q:"A view in a database is an example of which abstraction level?",options:["Physical","Logical","External/View","Internal"],answer:2,explain:"A database view is a virtual table presenting a customized subset of data for a user. It is the classic example of the External/View level — users see only the data relevant to them without knowing the underlying structure."},
  // DB LANGUAGES & RELATIONSHIPS
  {id:11,topic:"DB Languages & Relationships",q:"DDL stands for ___.",options:["Data Definition Language","Data Deployment Language","Database Design Logic","Data Deletion Layer"],answer:0,explain:"DDL (Data Definition Language) is the subset of SQL used to define and manage the structure of database objects. Commands include CREATE, ALTER, DROP, and TRUNCATE."},
  {id:12,topic:"DB Languages & Relationships",q:"Which SQL command is used to create a new table?",options:["INSERT","ALTER","CREATE","MAKE"],answer:2,explain:"CREATE is a DDL command used to create new database objects like tables, views, indexes, and databases. Example: CREATE TABLE students (id INT PRIMARY KEY, name VARCHAR(50));"},
  {id:13,topic:"DB Languages & Relationships",q:"DML (Data Manipulation Language) includes which of the following?",options:["CREATE, DROP, ALTER","SELECT, INSERT, UPDATE, DELETE","GRANT, REVOKE","COMMIT, ROLLBACK"],answer:1,explain:"DML (Data Manipulation Language) operates on the data within tables. SELECT retrieves data, INSERT adds data, UPDATE modifies data, and DELETE removes data. These are the core data operations."},
  {id:14,topic:"DB Languages & Relationships",q:"DCL (Data Control Language) is used for ___.",options:["Defining tables","Querying data","Granting and revoking access permissions","Transaction control"],answer:2,explain:"DCL (Data Control Language) controls access to data. GRANT gives users permissions on database objects, and REVOKE removes those permissions. It is essential for database security management."},
  {id:15,topic:"DB Languages & Relationships",q:"TCL (Transaction Control Language) includes ___.",options:["COMMIT and ROLLBACK","SELECT and INSERT","CREATE and DROP","GRANT and REVOKE"],answer:0,explain:"TCL (Transaction Control Language) manages database transactions. COMMIT permanently saves changes, ROLLBACK undoes changes since the last commit, and SAVEPOINT creates a checkpoint within a transaction."},
  {id:16,topic:"DB Languages & Relationships",q:"Which command removes a table and all its data permanently?",options:["DELETE","TRUNCATE","DROP","REMOVE"],answer:2,explain:"DROP is a DDL command that permanently removes a table along with its structure, data, indexes, and constraints. DELETE only removes rows. TRUNCATE removes all rows but keeps the table structure."},
  {id:17,topic:"DB Languages & Relationships",q:"What type of relationship exists when one record in Table A relates to many records in Table B?",options:["One-to-One","Many-to-Many","One-to-Many","Zero-to-Many"],answer:2,explain:"A One-to-Many relationship means a single record in Table A can be associated with multiple records in Table B, but each record in Table B links to only one in Table A. Example: One Department has many Employees."},
  {id:18,topic:"DB Languages & Relationships",q:"A Many-to-Many relationship in a relational database is typically resolved using ___.",options:["A foreign key only","An intermediate/junction table","A composite primary key on one table","A view"],answer:1,explain:"Since relational databases cannot directly represent Many-to-Many relationships, they are broken into two One-to-Many relationships using a junction/bridge table. Example: Students and Courses are linked through an Enrollments table."},
  {id:19,topic:"DB Languages & Relationships",q:"A foreign key in a table ___.",options:["Must be unique in its table","References a primary key in another table","Cannot accept NULL values","Is always indexed automatically"],answer:1,explain:"A foreign key is a column (or set of columns) in one table that refers to the PRIMARY KEY of another table. It establishes a link between the two tables and enforces referential integrity."},
  {id:20,topic:"DB Languages & Relationships",q:"Referential integrity ensures ___.",options:["No duplicate rows exist","Foreign key values match existing primary key values","All attributes are atomic","Queries return consistent results"],answer:1,explain:"Referential integrity is a database constraint that ensures foreign key values in a child table always correspond to valid primary key values in the parent table — preventing orphaned records."},
  // ER DIAGRAM
  {id:21,topic:"ER Diagram",q:"In an ER diagram, an entity is represented by ___.",options:["A diamond","A rectangle","An ellipse","A double rectangle"],answer:1,explain:"In Chen's ER notation, entities (objects that exist independently) are drawn as rectangles. Examples: Student, Employee, Product. A double rectangle represents a weak entity that depends on another entity."},
  {id:22,topic:"ER Diagram",q:"Attributes in an ER diagram are represented by ___.",options:["Rectangles","Diamonds","Ellipses","Triangles"],answer:2,explain:"Attributes (properties of an entity) are drawn as ellipses/ovals connected to their entity by a line. The primary key attribute is underlined inside the ellipse."},
  {id:23,topic:"ER Diagram",q:"Relationships in an ER diagram are represented by ___.",options:["Rectangles","Diamonds","Ellipses","Circles"],answer:1,explain:"Relationships (associations between two or more entities) are drawn as diamonds in Chen's ER notation. The diamond is labeled with a verb describing the relationship (e.g., 'Enrolls', 'Works_In')."},
  {id:24,topic:"ER Diagram",q:"A weak entity in an ER diagram is shown by ___.",options:["A single rectangle","A double rectangle","A dashed ellipse","A dashed diamond"],answer:1,explain:"A weak entity cannot be uniquely identified by its own attributes alone — it depends on a strong (owner) entity. It is drawn with a DOUBLE rectangle, and its identifying relationship uses a double diamond."},
  {id:25,topic:"ER Diagram",q:"A derived attribute in an ER diagram is represented by ___.",options:["A solid ellipse","A dashed ellipse","A double ellipse","A rectangle"],answer:1,explain:"A derived attribute can be computed from other stored attributes. It is drawn with a DASHED ellipse. Example: Age can be derived from Date_of_Birth, so Age is a derived attribute."},
  {id:26,topic:"ER Diagram",q:"A multivalued attribute is shown with ___.",options:["A dashed ellipse","A double ellipse","A rectangle with a line","A diamond"],answer:1,explain:"A multivalued attribute can hold more than one value for a single entity. It is drawn with a DOUBLE ellipse. Example: A person can have multiple phone numbers, so Phone_Number is multivalued."},
  {id:27,topic:"ER Diagram",q:"A weak entity CANNOT exist without its ___.",options:["Derived attribute","Identifying entity","Foreign key","Primary key"],answer:1,explain:"A weak entity depends entirely on its owner/identifying (strong) entity for its existence. Without the identifying entity, the weak entity has no meaning. Example: A Dependent cannot exist without the Employee it belongs to."},
  {id:28,topic:"ER Diagram",q:"Total participation in an ER diagram is shown by ___.",options:["A single line","A double line","A dashed line","A dotted diamond"],answer:1,explain:"Total participation (mandatory) means EVERY entity instance must participate in the relationship — drawn as a DOUBLE line. Partial participation (optional) uses a single line."},
  {id:29,topic:"ER Diagram",q:"Which notation represents cardinality of exactly ONE in an ER diagram (crow's foot)?",options:["Crow's foot","Single bar","Double bar","Circle"],answer:1,explain:"In Crow's Foot notation, a single bar ( | ) means exactly ONE. A crow's foot (three prongs) means MANY. A circle means ZERO (optional). These symbols at both ends of a line show cardinality."},
  {id:30,topic:"ER Diagram",q:"A composite attribute is ___.",options:["An attribute derived from other attributes","An attribute with multiple values","An attribute made up of multiple sub-attributes","An attribute that is also a primary key"],answer:2,explain:"A composite attribute can be divided into smaller sub-parts. Example: Full_Name splits into First_Name, Middle_Name, Last_Name. This differs from multivalued (holds many values) and derived (computed) attributes."},
  // RELATIONAL MODEL & ALGEBRA
  {id:31,topic:"Relational Model & Algebra",q:"In the relational model, a relation is equivalent to ___.",options:["A column","A row","A table","A database"],answer:2,explain:"In the formal relational model (proposed by E.F. Codd in 1970), a 'relation' is the mathematical equivalent of a TABLE — a set of tuples sharing the same attributes."},
  {id:32,topic:"Relational Model & Algebra",q:"A tuple in a relational database corresponds to ___.",options:["A column","A row","A table","An attribute"],answer:1,explain:"A tuple is the formal term for a single ROW in a relation/table. Each tuple represents one record and contains a value for each attribute (column) in the relation."},
  {id:33,topic:"Relational Model & Algebra",q:"An attribute in a relational model corresponds to ___.",options:["A row","A table","A column","A database"],answer:2,explain:"An attribute is the formal term for a COLUMN in a relation. It represents a specific property recorded for each entity. Every attribute has a domain — the set of permitted values."},
  {id:34,topic:"Relational Model & Algebra",q:"The degree of a relation is defined as ___.",options:["The number of tuples","The number of attributes","The number of tables","The number of keys"],answer:1,explain:"The DEGREE of a relation is the number of ATTRIBUTES (columns) it contains. A relation with 5 columns has degree 5. This differs from cardinality, which is the number of rows."},
  {id:35,topic:"Relational Model & Algebra",q:"The cardinality of a relation refers to ___.",options:["The number of attributes","The number of tuples/rows","The number of foreign keys","The number of indices"],answer:1,explain:"The CARDINALITY of a relation is the number of TUPLES (rows) it currently contains. Unlike degree (fixed by design), cardinality changes whenever rows are inserted or deleted."},
  {id:36,topic:"Relational Model & Algebra",q:"Which relational algebra operation selects rows that satisfy a condition?",options:["Projection (π)","Selection (σ)","Join (⋈)","Union (∪)"],answer:1,explain:"Selection (σ) filters ROWS based on a condition (predicate) — equivalent to SQL's WHERE clause. Example: σ(salary > 5000)(Employee) returns only employees earning above 5000."},
  {id:37,topic:"Relational Model & Algebra",q:"The Projection (π) operation in relational algebra ___.",options:["Selects specific rows","Selects specific columns","Joins two tables","Removes duplicates between two relations"],answer:1,explain:"Projection (π) selects specific COLUMNS (attributes) from a relation, discarding the rest — equivalent to listing specific column names in a SELECT statement. Duplicate rows are automatically eliminated."},
  {id:38,topic:"Relational Model & Algebra",q:"The UNION operation in relational algebra requires that both relations ___.",options:["Have the same primary key","Be union-compatible (same number and type of attributes)","Share a foreign key","Have the same number of rows"],answer:1,explain:"For UNION (∪) both relations must be union-compatible: same number of attributes with compatible domains. The result contains all tuples from both relations with duplicates removed."},
  {id:39,topic:"Relational Model & Algebra",q:"The Cartesian Product (×) of two relations R(3 tuples) and S(4 tuples) yields ___.",options:["7 tuples","1 tuple","12 tuples","3 tuples"],answer:2,explain:"Cartesian Product (×) pairs EVERY tuple in R with EVERY tuple in S. So 3 × 4 = 12 tuples. The result has all attributes of both relations. A JOIN is a Cartesian Product followed by a Selection."},
  {id:40,topic:"Relational Model & Algebra",q:"A natural join combines two relations based on ___.",options:["A specified condition","All common attribute names","Primary keys only","Foreign keys only"],answer:1,explain:"A Natural Join (⋈) automatically joins two relations on ALL attributes that share the same name and domain — no explicit condition needed. The result has no duplicate attribute columns."},
  {id:41,topic:"Relational Model & Algebra",q:"Which normal form eliminates partial dependencies?",options:["1NF","2NF","3NF","BCNF"],answer:1,explain:"2NF (Second Normal Form) eliminates partial dependencies — where a non-key attribute depends on only PART of a composite primary key. A relation must first be in 1NF before achieving 2NF."},
  {id:42,topic:"Relational Model & Algebra",q:"A relation is in 1NF when ___.",options:["It has no partial dependencies","All attributes are atomic (no repeating groups)","It has no transitive dependencies","All keys are candidate keys"],answer:1,explain:"1NF (First Normal Form) requires every attribute to contain only ATOMIC (indivisible, single) values — no lists, arrays, or repeating groups within a single cell."},
  {id:43,topic:"Relational Model & Algebra",q:"Functional dependency X → Y means ___.",options:["Y determines X","X determines Y","X and Y are both keys","X and Y must be primary keys"],answer:1,explain:"Functional dependency X → Y means the value of X UNIQUELY DETERMINES the value of Y. For any two tuples with the same X, they must have the same Y. X is called the determinant."},
  {id:44,topic:"Relational Model & Algebra",q:"A superkey is ___.",options:["A key that is a subset of another key","Any set of attributes that uniquely identifies a tuple","Only the primary key","A foreign key that references itself"],answer:1,explain:"A superkey is ANY set of one or more attributes that can uniquely identify every tuple in a relation. A relation can have many superkeys. The primary key is the chosen minimal superkey (candidate key)."},
  {id:45,topic:"Relational Model & Algebra",q:"A candidate key is ___.",options:["Any superkey","A minimal superkey (no proper subset is also a superkey)","A foreign key","A derived attribute"],answer:1,explain:"A candidate key is a MINIMAL superkey — you cannot remove any attribute from it and still uniquely identify tuples. A table can have multiple candidate keys; one becomes the primary key and the rest are alternate keys."},
  // MySQL
  {id:46,topic:"MySQL",q:"Which MySQL statement retrieves all columns from a table named 'students'?",options:["GET * FROM students;","FETCH ALL FROM students;","SELECT * FROM students;","SHOW * FROM students;"],answer:2,explain:"SELECT is the DML command for retrieving data. The asterisk (*) means 'all columns'. SELECT * FROM students; retrieves every column and every row from the students table."},
  {id:47,topic:"MySQL",q:"Which clause is used to filter records in a SELECT query?",options:["HAVING","ORDER BY","WHERE","GROUP BY"],answer:2,explain:"The WHERE clause filters individual ROWS before any grouping. Example: SELECT * FROM students WHERE grade = 'A'; — HAVING is used after GROUP BY to filter groups, not individual rows."},
  {id:48,topic:"MySQL",q:"What does the AUTO_INCREMENT attribute do in MySQL?",options:["Automatically backs up data","Automatically generates unique integer values","Automatically indexes the column","Automatically encrypts values"],answer:1,explain:"AUTO_INCREMENT automatically generates a unique sequential integer whenever a new row is inserted without specifying that column's value. It is typically applied to primary key columns: id INT AUTO_INCREMENT PRIMARY KEY."},
  {id:49,topic:"MySQL",q:"Which MySQL data type stores variable-length character strings up to 65,535 characters?",options:["CHAR","VARCHAR","TEXT","BLOB"],answer:2,explain:"TEXT stores variable-length strings up to 65,535 characters and does not require a length specification. VARCHAR also handles variable strings but requires a declared max length. CHAR is fixed-length. BLOB stores binary data."},
  {id:50,topic:"MySQL",q:"The PRIMARY KEY constraint in MySQL ___.",options:["Allows duplicate values","Allows NULL values","Uniquely identifies each row and disallows NULLs","Is optional for every table"],answer:2,explain:"A PRIMARY KEY uniquely identifies every row and automatically enforces UNIQUE (no duplicates) and NOT NULL (no empty values). Every table should have a primary key for data integrity."},
  {id:51,topic:"MySQL",q:"Which MySQL command shows all databases available?",options:["LIST DATABASES;","DISPLAY DATABASES;","SHOW DATABASES;","GET DATABASES;"],answer:2,explain:"SHOW DATABASES; lists all databases on the MySQL server the current user has access to. Related: SHOW TABLES; lists tables in the selected database, and SHOW COLUMNS FROM table_name; lists columns."},
  {id:52,topic:"MySQL",q:"To select a database to work with in MySQL, you use ___.",options:["OPEN database_name;","CONNECT database_name;","USE database_name;","SELECT database_name;"],answer:2,explain:"The USE statement selects a specific database as the active/default database for subsequent queries. Example: USE school; — all subsequent queries operate on the 'school' database."},
  {id:53,topic:"MySQL",q:"What is the correct MySQL syntax to add a new column 'email' to a table 'users'?",options:["INSERT COLUMN email VARCHAR(100) INTO users;","ALTER TABLE users ADD email VARCHAR(100);","UPDATE TABLE users ADD COLUMN email;","MODIFY TABLE users ADD email;"],answer:1,explain:"ALTER TABLE is the DDL command for modifying an existing table structure. ADD adds a new column. Syntax: ALTER TABLE table_name ADD column_name datatype; You can also DROP or MODIFY columns with ALTER TABLE."},
  {id:54,topic:"MySQL",q:"The GROUP BY clause in MySQL is used to ___.",options:["Sort query results","Filter groups using conditions","Aggregate rows sharing a common value","Join multiple tables"],answer:2,explain:"GROUP BY groups rows sharing the same value in a specified column into summary rows. It is always used with aggregate functions. Example: SELECT dept, COUNT(*) FROM employees GROUP BY dept;"},
  {id:55,topic:"MySQL",q:"Which aggregate function returns the total number of rows?",options:["SUM()","AVG()","COUNT()","MAX()"],answer:2,explain:"COUNT() returns the number of rows matching a condition. COUNT(*) counts all rows including NULLs. COUNT(column) counts only non-NULL values. SUM() adds values, AVG() computes averages, MAX() finds the highest value."},
  {id:56,topic:"MySQL",q:"The HAVING clause in MySQL is used to ___.",options:["Filter rows before grouping","Filter groups after GROUP BY","Sort the result","Join tables"],answer:1,explain:"HAVING filters GROUPS produced by GROUP BY — it works like WHERE but applies AFTER grouping. Example: SELECT dept, COUNT(*) FROM employees GROUP BY dept HAVING COUNT(*) > 5; — returns departments with more than 5 employees."},
  {id:57,topic:"MySQL",q:"An INNER JOIN returns ___.",options:["All rows from the left table","All rows from the right table","Only matching rows from both tables","All rows from both tables"],answer:2,explain:"INNER JOIN returns only rows where there is a MATCH in BOTH tables based on the join condition. Unmatched rows from either table are excluded. LEFT JOIN and RIGHT JOIN include unmatched rows from one side."},
  {id:58,topic:"MySQL",q:"Which MySQL statement permanently removes all rows from a table but keeps the table structure?",options:["DROP TABLE","DELETE FROM table","TRUNCATE TABLE","REMOVE ALL FROM table"],answer:2,explain:"TRUNCATE TABLE removes ALL rows instantly and cannot easily be rolled back. It keeps the table structure intact. DROP TABLE also removes the structure. DELETE FROM supports WHERE filtering and can be rolled back."},
  {id:59,topic:"MySQL",q:"What does the DISTINCT keyword do in a SELECT query?",options:["Sorts the results","Removes duplicate rows from the result set","Filters NULL values","Limits the number of results"],answer:1,explain:"SELECT DISTINCT eliminates duplicate rows from the result, returning only unique value combinations. Example: SELECT DISTINCT city FROM customers; returns each city name only once, even if many customers share the same city."},
  {id:60,topic:"MySQL",q:"The default port number for MySQL is ___.",options:["8080","5432","1433","3306"],answer:3,explain:"MySQL listens on port 3306 by default. For reference: PostgreSQL = 5432, Microsoft SQL Server = 1433, HTTP = 8080. Knowing default ports is important for firewall rules, network configuration, and security auditing."},
];

const TOPICS = [...new Set(QUESTIONS.map(q => q.topic))];

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let pool = [], currentTopic = "All", idx = 0, answers = {}, chosen = null, confirmed = false;

// ═══════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0,0);
}

function goHome() { show('home'); }

// ═══════════════════════════════════════════════
//  HOME — build topic cards
// ═══════════════════════════════════════════════
function buildHome() {
  const list = document.getElementById('topic-list');
  const allBtn = makeTopicCard("🗂  All Topics — Full Exam", 60, "#ffffff", "rgba(255,255,255,.06)", "All");
  list.appendChild(allBtn);
  TOPICS.forEach(t => {
    const c = TOPIC_COLORS[t];
    const n = QUESTIONS.filter(q => q.topic === t).length;
    list.appendChild(makeTopicCard(t, n, c.accent, c.badge, t));
  });
}

function makeTopicCard(label, count, accent, bg, filter) {
  const btn = document.createElement('button');
  btn.className = 'topic-card';
  btn.style.borderColor = accent + '30';
  btn.innerHTML = `<span>${label}</span><span style="color:${accent}">${count} Qs →</span>`;
  btn.onclick = () => startQuiz(filter);
  return btn;
}

// ═══════════════════════════════════════════════
//  QUIZ
// ═══════════════════════════════════════════════
function startQuiz(filter) {
  currentTopic = filter;
  pool = filter === "All" ? [...QUESTIONS] : QUESTIONS.filter(q => q.topic === filter);
  idx = 0; answers = {}; chosen = null; confirmed = false;
  renderQuestion();
  show('quiz');
}

function renderQuestion() {
  const q = pool[idx];
  const c = TOPIC_COLORS[q.topic];

  // progress
  const fill = document.getElementById('progress-fill');
  fill.style.width = (idx / pool.length * 100) + '%';
  fill.style.background = c.accent;

  // counter
  document.getElementById('q-counter').textContent = (idx+1) + ' / ' + pool.length;

  // chip
  const chip = document.getElementById('q-chip');
  chip.textContent = q.topic;
  chip.style.background = c.badge;
  chip.style.color = c.accent;

  // question
  document.getElementById('q-text').textContent = 'Q' + q.id + '. ' + q.q;

  // options
  const oc = document.getElementById('options-container');
  oc.innerHTML = '';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'opt';
    div.id = 'opt-' + i;
    div.innerHTML = `<span class="key">${String.fromCharCode(65+i)}.</span><span class="txt">${opt}</span><span class="icon" id="icon-${i}"></span>`;
    div.onclick = () => selectOption(i);
    oc.appendChild(div);
  });

  // explain
  document.getElementById('explain-box').style.display = 'none';
  document.getElementById('explain-box').innerHTML = '';

  // buttons
  const cb = document.getElementById('confirm-btn');
  const nb = document.getElementById('next-btn');
  cb.style.display = 'block';
  cb.style.background = '#111f2a';
  cb.style.color = '#2a4a5a';
  nb.style.display = 'none';
  chosen = null; confirmed = false;
}

function selectOption(i) {
  if (confirmed) return;
  chosen = i;
  document.querySelectorAll('.opt').forEach((el, j) => {
    el.classList.remove('selected');
    el.style.borderColor = '#192c38';
    el.style.background = '#0b1c27';
    el.style.color = '#aac8d5';
  });
  const q = pool[idx];
  const c = TOPIC_COLORS[q.topic];
  const el = document.getElementById('opt-' + i);
  el.style.borderColor = c.accent;
  el.style.background = 'rgba(' + hexToRgb(c.accent) + ',.07)';
  el.style.color = c.accent;
  // enable confirm
  const cb = document.getElementById('confirm-btn');
  cb.style.background = c.accent;
  cb.style.color = '#07121a';
}

function confirmAnswer() {
  if (chosen === null) return;
  confirmed = true;
  const q = pool[idx];
  const c = TOPIC_COLORS[q.topic];
  answers[q.id] = chosen;

  // lock all options, colour correct/wrong
  document.querySelectorAll('.opt').forEach((el, i) => {
    el.classList.add('locked');
    el.onclick = null;
    el.style.transform = 'none';
    if (i === q.answer) {
      el.style.borderColor = '#a8ff3e';
      el.style.background = 'rgba(168,255,62,.07)';
      el.style.color = '#a8ff3e';
      document.getElementById('icon-' + i).textContent = '✓';
    } else if (i === chosen && i !== q.answer) {
      el.style.borderColor = '#ff3838';
      el.style.background = 'rgba(255,56,56,.06)';
      el.style.color = '#ff7070';
      document.getElementById('icon-' + i).textContent = '✗';
    } else {
      el.style.borderColor = '#192c38';
      el.style.background = '#0b1c27';
      el.style.color = '#4a6a78';
    }
  });

  // explanation
  const isRight = chosen === q.answer;
  const eb = document.getElementById('explain-box');
  eb.style.display = 'block';
  eb.className = 'explain slide';
  eb.style.background   = isRight ? '#09200f' : '#1c0909';
  eb.style.border       = '1.5px solid ' + (isRight ? 'rgba(168,255,62,.27)' : 'rgba(255,56,56,.27)');
  eb.innerHTML = `
    <div class="ex-head">
      <span style="font-size:1.25rem">${isRight ? '🎯' : '📖'}</span>
      <div>
        <div class="ex-title" style="color:${isRight?'#a8ff3e':'#ff7070'}">${isRight ? 'Correct!' : 'Incorrect'}</div>
        ${!isRight ? `<div class="correct-ans">✓ Correct answer: <strong>${q.options[q.answer]}</strong></div>` : ''}
      </div>
    </div>
    <p style="border-left-color:${isRight?'rgba(168,255,62,.4)':'rgba(255,56,56,.4)'}">${q.explain}</p>
  `;

  // hide confirm, show next
  document.getElementById('confirm-btn').style.display = 'none';
  const nb = document.getElementById('next-btn');
  nb.style.display = 'block';
  nb.style.background = c.accent;
  nb.style.color = '#07121a';
  nb.textContent = idx + 1 < pool.length ? 'Next Question →' : 'View Full Results →';
}

function nextQuestion() {
  if (idx + 1 < pool.length) { idx++; renderQuestion(); }
  else showResults();
}

// ═══════════════════════════════════════════════
//  RESULTS
// ═══════════════════════════════════════════════
function showResults() {
  const score  = pool.filter(q => answers[q.id] === q.answer).length;
  const pct    = pool.length ? Math.round(score / pool.length * 100) : 0;
  const grade  = getGrade(pct);
  const missed = pool.filter(q => answers[q.id] !== undefined && answers[q.id] !== q.answer);

  // score hero
  document.getElementById('score-pct').textContent  = pct + '%';
  document.getElementById('score-pct').style.color  = grade.color;
  document.getElementById('grade-label').textContent = grade.emoji + ' ' + grade.label;
  document.getElementById('grade-label').style.color = grade.color;
  document.getElementById('score-sub').textContent   = score + ' correct · ' + missed.length + ' missed · ' + pool.length + ' total';
  document.getElementById('grade-note').textContent  = grade.note;

  // topic stats
  const topicStats = buildTopicStats();
  const ts = document.getElementById('topic-stats');
  ts.innerHTML = '';
  topicStats.forEach(({ topic, correct, total, pct:tp }) => {
    const acc = TOPIC_COLORS[topic].accent;
    const st  = tp>=80 ? 'Strong' : tp>=60 ? 'Decent' : 'Needs Work';
    const sc  = tp>=80 ? '#a8ff3e': tp>=60 ? '#ffca28': '#ff6b35';
    ts.innerHTML += `
      <div class="stat-card" style="border:1px solid ${acc}1e;margin-bottom:10px;">
        <div class="stat-row">
          <span style="font-size:.88rem;color:#c0d8e2;">${topic}</span>
          <div style="display:flex;gap:10px;align-items:center;">
            <span class="mono" style="font-size:.7rem;color:${sc};">${st}</span>
            <span class="mono" style="color:${acc};font-size:.8rem;">${correct}/${total} · ${tp}%</span>
          </div>
        </div>
        <div class="pbar"><div class="pfill" style="width:${tp}%;background:${acc};"></div></div>
      </div>`;
  });

  // improvement
  const weak = topicStats.filter(t => t.pct < 60);
  const imp  = document.getElementById('improve-section');
  if (weak.length) {
    let html = `<div class="improve-box"><div class="label" style="color:#ff6b35;margin-bottom:16px;">📌 IMPROVEMENT PLAN</div>`;
    weak.forEach(({ topic, pct:tp }) => {
      html += `<div class="improve-item">
        <div style="display:flex;justify-content:space-between;margin-bottom:7px;">
          <span style="font-weight:700;color:#ff8855;font-size:.9rem;">${topic}</span>
          <span class="mono" style="font-size:.75rem;color:#ff6b35;">${tp}% scored</span>
        </div>
        <div class="improve-tip">${IMPROVE_TIPS[topic]}</div>
      </div>`;
    });
    imp.innerHTML = html + '</div>';
  } else { imp.innerHTML = ''; }

  // strong
  const strong = topicStats.filter(t => t.pct >= 80);
  const str = document.getElementById('strong-section');
  if (strong.length) {
    let html = `<div class="strong-box"><div class="label" style="color:#a8ff3e;margin-bottom:12px;">🏆 STRONG AREAS — KEEP IT UP</div>`;
    strong.forEach(({ topic, correct, total, pct:tp }) => {
      html += `<div class="strong-row"><span style="color:#a8ff3e;">${topic}</span><span class="mono" style="color:#5a9a3a;">${correct}/${total} · ${tp}%</span></div>`;
    });
    str.innerHTML = html + '</div>';
  } else { str.innerHTML = ''; }

  // missed
  const ml = document.getElementById('missed-list');
  const mt = document.getElementById('missed-title');
  const pb = document.getElementById('perfect-box');
  if (missed.length) {
    pb.style.display = 'none';
    mt.textContent = '🔍 MISSED QUESTIONS — FULL REVIEW (' + missed.length + ')';
    ml.innerHTML = '';
    missed.forEach(q => {
      const acc = TOPIC_COLORS[q.topic].accent;
      const details = document.createElement('details');
      details.className = 'missed-item';
      details.innerHTML = `
        <summary class="missed-summary">
          <span style="flex:1;line-height:1.5;"><span class="mono" style="font-size:.68rem;color:${acc};margin-right:8px;">Q${q.id}</span>${q.q}</span>
          <span style="color:#3a6a7a;font-size:.78rem;white-space:nowrap;padding-top:2px;">tap ▾</span>
        </summary>
        <div class="missed-body">
          <div class="ans-row" style="color:#ff7070;">✗ Your answer:&nbsp;&nbsp; ${q.options[answers[q.id]] ?? '—'}</div>
          <div class="ans-row" style="color:#a8ff3e;">✓ Correct answer: ${q.options[q.answer]}</div>
          <div class="missed-explain" style="border-left-color:${acc}55;">${q.explain}</div>
        </div>`;
      ml.appendChild(details);
    });
  } else {
    mt.textContent = '';
    ml.innerHTML = '';
    pb.style.display = 'block';
  }

  // buttons
  const weak0 = weak[0];
  const rb = document.getElementById('result-buttons');
  rb.innerHTML = `
    <button class="btn btn-primary" onclick="startQuiz('${currentTopic}')">🔄 Retry This Quiz</button>
    ${weak0 ? `<button class="btn btn-danger" onclick="startQuiz('${weak0.topic}')">📚 Practice Weakest: ${weak0.topic}</button>` : ''}
    <button class="btn btn-green" onclick="startQuiz('All')">📝 Take Full 60-Question Exam</button>
    <button class="btn btn-outline" onclick="goHome()">← Back to Home</button>`;

  show('result');
}

function buildTopicStats() {
  return TOPICS.map(t => {
    const tqs = pool.filter(q => q.topic === t);
    if (!tqs.length) return null;
    const correct = tqs.filter(q => answers[q.id] === q.answer).length;
    return { topic:t, correct, total:tqs.length, pct:Math.round(correct/tqs.length*100) };
  }).filter(Boolean);
}

function getGrade(pct) {
  if (pct >= 90) return { label:"A — Distinction", color:"#a8ff3e", emoji:"🏆", note:"Outstanding mastery of DBMS. You are exam-ready." };
  if (pct >= 75) return { label:"B — Credit",      color:"#00e5ff", emoji:"🎯", note:"Very solid performance. Polish the weaker spots and you're set." };
  if (pct >= 60) return { label:"C — Pass",        color:"#ffca28", emoji:"📚", note:"Satisfactory. Focused revision on weak areas will push you higher." };
  if (pct >= 45) return { label:"D — Borderline",  color:"#ff6b35", emoji:"⚠️", note:"More revision needed. Work through each topic systematically." };
  return           { label:"F — Fail",             color:"#ff3a3a", emoji:"💪", note:"Significant gaps found. Rebuild from fundamentals — you can do this." };
}

function hexToRgb(hex) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r ? `${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}` : '0,0,0';
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
buildHome();
</script>
</body>
</html>
